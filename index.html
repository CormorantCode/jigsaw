<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jigsaw Milestone 1 — Tab Curve + Grid</title>
<style>
  body { font-family: system-ui, sans-serif; background:#1b1c20; color:#eee; margin:0; display:flex; }
  #controls { width: 260px; padding: 16px; box-sizing:border-box; background:#242529; height:100vh; overflow-y:auto; }
  #controls h2 { font-size: 15px; margin: 0 0 12px; color:#9fd3ff;}
  #controls label { display:block; font-size:12px; margin-top:12px; color:#bbb; }
  #controls input[type=range] { width:100%; }
  #controls .val { float:right; color:#9fd3ff; }
  #stage { flex:1; display:flex; align-items:center; justify-content:center; }
  svg { background:#111; border:1px solid #333; }
  .piece-outline { fill:none; stroke:#5ec3ff; stroke-width:1.5; }
  .piece-outline.exploded { stroke:#ffb15e; }
  button { width:100%; margin-top:14px; padding:8px; background:#3a6df0; border:none; color:white; border-radius:6px; cursor:pointer; font-size:13px;}
  button:hover { background:#4a7bff; }
  .row { display:flex; gap:8px; }
  .row > div { flex:1; }
</style>
</head>
<body>
<div id="controls">
  <h2>Tab Curve Tuning</h2>

  <label>Columns <span class="val" id="colsVal">6</span>
    <input type="range" id="cols" min="2" max="20" value="6">
  </label>
  <label>Rows <span class="val" id="rowsVal">6</span>
    <input type="range" id="rows" min="2" max="20" value="6">
  </label>
  <label>Tab height / protrusion (% of piece) <span class="val" id="sizeVal">26</span>
    <input type="range" id="size" min="10" max="35" value="26">
  </label>
  <label>Neck width (% of piece) <span class="val" id="neckVal">16</span>
    <input type="range" id="neck" min="6" max="30" value="16">
  </label>
  <label>Tab diameter / roundness (% of piece) <span class="val" id="diameterVal">40</span>
    <input type="range" id="diameter" min="10" max="45" value="40">
  </label>
  <label>Edge bow (subtle curve) <span class="val" id="bowVal">10</span>
    <input type="range" id="bow" min="0" max="15" value="10">
  </label>
  <label>Seed <span class="val" id="seedVal">1</span>
    <input type="range" id="seed" min="1" max="999" value="1">
  </label>

  <button id="regen">Regenerate (new seed)</button>
  <button id="explode">Toggle exploded view</button>

  <p style="font-size:11px; color:#888; margin-top:20px; line-height:1.5;">
    Milestone 1: tab-curve + edge-grid only, plain SVG outlines, no image yet.
    Confirms neighboring pieces truly mate before we clip an image to these paths.
  </p>
</div>
<div id="stage"></div>

<script>
// ---------- seeded RNG ----------
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---------- tab edge path builder ----------
// Builds a cubic-bezier path string (relative moves not used; absolute coords)
// from (x0,y0) to (x1,y1). dir: +1 or -1, which side the tab bulges toward
// relative to the direction of travel (left-hand normal).
// flat: if true, edge is a straight border line (no tab).
function tabPath(x0, y0, x1, y1, dir, size, neck, diameter, bow) {
  const dx = x1 - x0, dy = y1 - y0;
  const len = Math.hypot(dx, dy);
  const ux = dx / len, uy = dy / len;   // unit along edge
  const nx = -uy, ny = ux;              // unit left-normal

  // amplitude (bulb height), neck (base opening width), and diameter (bulb
  // width at its widest point) are all independent, as fractions of edge length.
  const amp     = (size / 100) * len;
  const neckW   = (neck / 100) * len;
  const bulbDia = Math.max((diameter / 100) * len, neckW * 1.05); // bulb can't be narrower than the neck
  const center  = 0.5 * len;
  const overhang = (bulbDia - neckW) / 2;         // how far the bulb extends past the neck opening

  const s = dir * amp; // signed amplitude

  // Lead-in/lead-out bow: the straight-looking stretches on either side of the
  // tab aren't perfectly straight on real pieces — they bow slightly opposite
  // the tab's own bulge direction (concave on a protruding-tab side, convex on
  // an inset side). Small magnitude, so it reads as a subtle correction, not
  // a second bump.
  const bowAmt  = (bow / 100) * len;
  const bowSign = -dir;

  function pt(along, perp) {
    return {
      x: x0 + ux * along + nx * perp,
      y: y0 + uy * along + ny * perp
    };
  }

  const baseL = center - neckW / 2;
  const baseR = center + neckW / 2;

  const start = pt(baseL, 0);
  const apex  = pt(center, s);

  // left half of bump: base -> apex, bulging outward (overhang) via control points.
  // c1b sits level with the apex (same perpendicular offset) so the incoming
  // tangent at the apex is horizontal — that's what removes the point and
  // gives a smooth dome instead of a corner.
  const c1a = pt(baseL - overhang, s * 0.15);
  const c1b = pt(baseL - overhang * 0.7, s);

  // right half of bump: apex -> base, mirrored — c2a is level with the apex too,
  // so incoming and outgoing tangents match direction at the joint.
  const c2a = pt(baseR + overhang * 0.7, s);
  const c2b = pt(baseR + overhang, s * 0.15);

  const end = pt(baseR, 0);
  const edgeEnd = { x: x1, y: y1 };

  let d = '';
  const leadInMid  = pt(baseL * 0.5, bowSign * bowAmt);
  d += `Q ${leadInMid.x} ${leadInMid.y}, ${start.x} ${start.y} `;
  d += `C ${c1a.x} ${c1a.y}, ${c1b.x} ${c1b.y}, ${apex.x} ${apex.y} `;
  d += `C ${c2a.x} ${c2a.y}, ${c2b.x} ${c2b.y}, ${end.x} ${end.y} `;
  const leadOutMid = pt(baseR + (len - baseR) * 0.5, bowSign * bowAmt);
  d += `Q ${leadOutMid.x} ${leadOutMid.y}, ${edgeEnd.x} ${edgeEnd.y} `;
  return d;
}

function flatPath(x0, y0, x1, y1) {
  return `L ${x1} ${y1} `;
}

// ---------- build grid of edge directions ----------
function buildEdgeGrid(cols, rows, rnd) {
  // horizontal interior edges: between row r and r+1, at each column c => direction for vertical cut
  // We store:
  //   vDir[r][c] = direction of the VERTICAL edge between piece(r,c-1) and piece(r,c), for c=1..cols-1
  //   hDir[r][c] = direction of the HORIZONTAL edge between piece(r-1,c) and piece(r,c), for r=1..rows-1
  const vDir = [];
  for (let r = 0; r < rows; r++) {
    vDir.push([]);
    for (let c = 1; c < cols; c++) {
      vDir[r].push(rnd() < 0.5 ? 1 : -1);
    }
  }
  const hDir2 = [];
  for (let r = 1; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push(rnd() < 0.5 ? 1 : -1);
    }
    hDir2.push(row);
  }
  return { vDir, hDir: hDir2 };
}

function piecePath(row, col, cols, rows, pieceW, pieceH, grid, size, neck, diameter, bow) {
  const x0 = col * pieceW, y0 = row * pieceH;
  const x1 = x0 + pieceW, y1 = y0 + pieceH;

  // top edge
  let d = `M ${x0} ${y0} `;
  if (row === 0) {
    d += flatPath(x0, y0, x1, y0);
  } else {
    const dir = grid.hDir[row - 1][col]; // direction defined from piece above's perspective (positive = bulges downward into this piece)
    d += tabPath(x0, y0, x1, y0, dir, size, neck, diameter, bow);
  }
  // right edge
  if (col === cols - 1) {
    d += flatPath(x1, y0, x1, y1);
  } else {
    const dir = grid.vDir[row][col]; // positive = bulges rightward into neighbor
    d += tabPath(x1, y0, x1, y1, dir, size, neck, diameter, bow);
  }
  // bottom edge (traverse right-to-left)
  if (row === rows - 1) {
    d += flatPath(x1, y1, x0, y1);
  } else {
    const dir = -grid.hDir[row][col]; // opposite sign: this piece is "below" the edge, so bulge direction flips
    d += tabPath(x1, y1, x0, y1, dir, size, neck, diameter, bow);
  }
  // left edge (traverse bottom-to-top)
  if (col === 0) {
    d += flatPath(x0, y1, x0, y0);
  } else {
    const dir = -grid.vDir[row][col - 1]; // opposite sign: this piece is to the "right" of the edge
    d += tabPath(x0, y1, x0, y0, dir, size, neck, diameter, bow);
  }
  d += 'Z';
  return d;
}

function render() {
  const cols = +document.getElementById('cols').value;
  const rows = +document.getElementById('rows').value;
  const size = +document.getElementById('size').value;
  const neck = +document.getElementById('neck').value;
  const diameter = +document.getElementById('diameter').value;
  const bow = +document.getElementById('bow').value;
  const seed = +document.getElementById('seed').value;

  document.getElementById('colsVal').textContent = cols;
  document.getElementById('rowsVal').textContent = rows;
  document.getElementById('sizeVal').textContent = size;
  document.getElementById('neckVal').textContent = neck;
  document.getElementById('diameterVal').textContent = diameter;
  document.getElementById('bowVal').textContent = bow;
  document.getElementById('seedVal').textContent = seed;

  const rnd = mulberry32(seed * 7919 + 13);
  const grid = buildEdgeGrid(cols, rows, rnd);

  // Pieces are always square, regardless of cols/rows — that's what keeps a
  // 6x9 grid a true 6x9 rectangle of uniform square pieces instead of
  // stretching each piece to force the whole board into a square.
  const pieceSize = 80;
  const pieceW = pieceSize, pieceH = pieceSize;
  const boardW = pieceSize * cols, boardH = pieceSize * rows;

  const explode = window.__explode || false;
  const gap = explode ? pieceSize * 0.35 : 0;
  const totalW = boardW + gap * (cols - 1);
  const totalH = boardH + gap * (rows - 1);

  // Scale display to fit a max render box while preserving the board's true
  // aspect ratio (never force it back toward square).
  const maxDim = 820;
  const scale = Math.min(maxDim / totalW, maxDim / totalH, 1.4);
  const displayW = totalW * scale, displayH = totalH * scale;

  let svg = `<svg viewBox="0 0 ${totalW} ${totalH}" width="${displayW}" height="${displayH}">`;
  const palette = ['#5ec3ff','#7dd3a0','#ffb15e','#ff8fa3','#c3a6ff','#f4e56a'];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const d = piecePath(r, c, cols, rows, pieceW, pieceH, grid, size, neck, diameter, bow);
      const ox = explode ? c * gap : 0;
      const oy = explode ? r * gap : 0;
      const color = palette[(r * cols + c) % palette.length];
      svg += `<g transform="translate(${ox},${oy})">`;
      svg += `<path d="${d}" class="piece-outline${explode ? ' exploded' : ''}" stroke="${color}"/>`;
      svg += `</g>`;
    }
  }
  svg += `</svg>`;
  document.getElementById('stage').innerHTML = svg;
}

document.querySelectorAll('#controls input[type=range]').forEach(el => el.addEventListener('input', render));
document.getElementById('regen').addEventListener('click', () => {
  document.getElementById('seed').value = Math.floor(Math.random() * 999) + 1;
  render();
});
document.getElementById('explode').addEventListener('click', () => {
  window.__explode = !window.__explode;
  render();
});

render();
</script>
</body>
</html>
